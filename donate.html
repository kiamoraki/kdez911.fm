<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDEZ - Donate</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>

<body class="donate-page">
    <a href="index.html" style="position: fixed; top: 2rem; left: 2rem; z-index: 100;">
        <img src="KDEZ_Logo.webp" alt="KDEZ Logo" style="max-width: 250px; height: auto;">
    </a>
    <div class="container">
        <div class="hero-text">
            <span class="yellow-scratch">GIVE</span>
            <span class="black-scratch">MONEY</span>
        </div>
        <nav class="chaotic-menu">
            <a href="about.html" class="menu-item size-l has-line offset-1">About</a>
            <a href="donate.html" class="menu-item size-xl has-lines-tb offset-2">Donate</a>

        <main class="content-area">

                <p>Support KDEZ's mission by making a donation. Choose your preferred platform below:</p>
