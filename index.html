<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDEZ 91.1 FM | (sur)real radio from the Salton Sea</title>
    <meta name="description" content="Community radio from Palm Springs to Mexico. Broadcasting on 91.1 FM around the Salton Sea, streaming live at kdez911.fm. Turn on. Tune out. Drop in.">
    <meta property="og:title" content="KDEZ 91.1 FM | (sur)real radio from the Salton Sea">
    <meta property="og:description" content="Broadcasting on 91.1 FM around the Sea, streaming live at kdez911.fm. Hit play.">
    <meta property="og:image" content="https://kdez911.fm/img/OG%20Share%20Cards/OG-home.jpg">
    <meta property="og:url" content="https://kdez911.fm/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://kdez911.fm/img/OG%20Share%20Cards/OG-home.jpg">
    <link rel="icon" type="image/x-icon" href="img/favicon/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="img/favicon/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="img/favicon/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#e2c898">
    <link rel="canonical" href="https://kdez911.fm/">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RadioStation",
      "name": "KDEZ 91.1 FM",
      "alternateName": "KDEZ",
      "url": "https://kdez911.fm",
      "description": "Voice of the Salton Sea. Volunteer-run community radio from Bombay Beach, California.",
      "broadcastFrequency": "91.1 FM",
      "areaServed": { "@type": "Place", "name": "Salton Sea, CA" },
      "parentOrganization": {
        "@type": "Organization",
        "name": "Voice of the Salton Sea",
        "nonprofitStatus": "Nonprofit501c3"
      }
    }
    </script>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body class="landing-page">
    <span class="sr-only">Aerial view of Bombay Beach on the Salton Sea at dusk</span>
    <a href="index.html" style="position: fixed; top: 2rem; left: 2rem; z-index: 100;">
        <img src="KDEZ_Logo.webp" alt="KDEZ 91.1 FM" style="max-width: 250px; height: auto;">
    </a>
    <div class="container">
        <div class="hero-text">
        </div>
        <nav class="chaotic-menu">
                <a href="our-station.html" class="menu-item size-l has-line offset-1">Our Station</a>
                <a href="donate.html" class="menu-item size-xl has-lines-tb offset-2">Donate</a>
                <a href="drop-in.html" class="menu-item size-m has-line-bottom offset-3">Drop In</a>
            </nav>

            <main class="content-area">
                <div class="text-content player-content">
                    <div class="radio-player">
                        <button id="radioToggle" class="radio-play" type="button"
                                aria-label="Play KDEZ 91.1 FM" aria-pressed="false">
                            <svg class="radio-icon" viewBox="0 0 100 100" aria-hidden="true">
                                <defs>
                                    <mask id="m-play">
                                        <circle cx="50" cy="50" r="50" fill="white"/>
                                        <polygon points="40,33 40,67 70,50" fill="black"/>
                                    </mask>
                                    <mask id="m-pause">
                                        <circle cx="50" cy="50" r="50" fill="white"/>
                                        <rect x="37" y="33" width="9" height="34" fill="black"/>
                                        <rect x="54" y="33" width="9" height="34" fill="black"/>
                                    </mask>
                                </defs>
                                <circle class="icon-fill-play" cx="50" cy="50" r="50" fill="currentColor" mask="url(#m-play)"/>
                                <circle class="icon-fill-pause" cx="50" cy="50" r="50" fill="currentColor" mask="url(#m-pause)"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </main>
    </div>
</body>
</html>
