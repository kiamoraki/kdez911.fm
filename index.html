<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDEZ</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body class="landing-page">
    <a href="index.html" style="position: fixed; top: 2rem; left: 2rem; z-index: 100;">
        <img src="KDEZ_Logo.webp" alt="KDEZ Logo" style="max-width: 250px; height: auto;">
    </a>
    <div class="container">
        <div class="hero-text">
            <span class="yellow-scratch">LIVE</span>
            <span class="black-scratch">STREAM</span>
        </div>
        <nav class="chaotic-menu">
                <a href="about.html" class="menu-item size-l has-line offset-1">About</a>
                <a href="donate.html" class="menu-item size-xl has-lines-tb offset-2">Donate</a>
                <a href="stay-in-touch.html" class="menu-item size-m has-line-bottom offset-3">Stay<br>in Touch</a>
            </nav>

            <main class="content-area">
                <div class="text-content player-content">
                    <div class="radio-player">
                        <button id="radioToggle" class="radio-play" type="button"
                                aria-label="Play KDEZ 91.1 FM" aria-pressed="false">
                            <svg class="radio-icon" viewBox="0 0 100 100" aria-hidden="true">
                                <polygon class="icon-play" points="36,24 36,76 80,50"></polygon>
                                <g class="icon-pause">
                                    <rect x="31" y="26" width="13" height="48"></rect>
                                    <rect x="56" y="26" width="13" height="48"></rect>
                                </g>
                            </svg>
                        </button>
                        <div class="radio-volume-row">
                            <svg class="radio-volume-icon" viewBox="0 0 24 24" aria-hidden="true">
                                <path class="spk" d="M3 9v6h4l5 4V5L7 9H3z"></path>
                                <path class="vw" d="M16 8.5a4 4 0 0 1 0 7"></path>
                                <path class="vw" d="M19 6a8 8 0 0 1 0 12"></path>
                            </svg>
                            <input id="radioVolume" class="radio-volume" type="range"
                                   min="0" max="100" value="80" aria-label="Volume">
                        </div>
                    </div>
                </div>
            </main>
    </div>
</body>
</html>
